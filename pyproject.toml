[build-system]
requires = ["setuptools>=65.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "engine"
version = "0.1.0"
description = "2D pygame engine"
authors = [{ name = "WhiteWolf45380" }]
dependencies = [
    "pyglet",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["engine*"]